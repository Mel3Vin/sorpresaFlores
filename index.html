<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frutería Málaga - Punto de Venta</title>
<style>
  :root{
    --rojo:#e2402a;
    --rojo-dark:#c22e1c;
    --naranja:#ff8a34;
    --verde:#3fa34d;
    --verde-dark:#2e7d38;
    --crema:#fff8ee;
    --gris:#5c5c5c;
    --libre:#3fa34d;
    --ocupada:#e2402a;
    --shadow:0 6px 18px rgba(0,0,0,.12);
    --radius:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:linear-gradient(160deg,#fff8ee 0%,#ffece0 100%);
    color:#2b2b2b;
    min-height:100vh;
  }
  header.app-header{
    background:linear-gradient(120deg,var(--rojo),var(--naranja));
    color:#fff;
    padding:18px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:var(--shadow);
    position:sticky;
    top:0;
    z-index:50;
    flex-wrap:wrap;
    gap:10px;
  }
  header.app-header .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  header.app-header .brand h1{
    font-size:1.35rem;
    line-height:1.1;
  }
  header.app-header .brand span.sub{
    display:block;
    font-size:.78rem;
    font-weight:400;
    opacity:.9;
  }
  header.app-header .logo{
    font-size:2rem;
    background:rgba(255,255,255,.2);
    border-radius:50%;
    width:52px;height:52px;
    display:flex;align-items:center;justify-content:center;
  }
  .header-actions{
    display:flex;
    gap:10px;
    align-items:center;
  }
  .btn-back{
    background:rgba(255,255,255,.2);
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    display:none;
    transition:.2s;
  }
  .btn-back:hover{background:rgba(255,255,255,.35);}
  .btn-back.show{display:inline-flex; align-items:center; gap:6px;}
  .btn-history{
    background:rgba(255,255,255,.2);
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
  }
  .btn-history:hover{background:rgba(255,255,255,.35);}
  .btn-history.active{background:#fff; color:var(--rojo-dark);}

  /* ---------- HISTORY VIEW ---------- */
  #historyView{display:none;}
  .history-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:16px;
  }
  .history-header h2{color:var(--rojo-dark); font-size:1.3rem;}
  .history-summary{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px 20px;
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }
  .history-summary .stat{display:flex; flex-direction:column;}
  .history-summary .stat .label{font-size:.78rem; color:var(--gris); font-weight:600;}
  .history-summary .stat .value{font-size:1.3rem; font-weight:800; color:var(--verde-dark);}
  .btn-clear-history{
    background:none;
    border:2px solid #eddfce;
    color:var(--gris);
    padding:9px 14px;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    font-size:.82rem;
  }
  .btn-clear-history:hover{border-color:var(--rojo); color:var(--rojo);}
  .history-list{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .history-empty{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:40px 20px;
    text-align:center;
    color:#999;
  }
  .history-card{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px 18px;
  }
  .history-card-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:10px;
    padding-bottom:10px;
    border-bottom:2px solid #f1e5d8;
  }
  .history-card-table{
    font-weight:800;
    color:var(--rojo-dark);
    font-size:1rem;
  }
  .history-card-date{
    font-size:.78rem;
    color:var(--gris);
  }
  .history-card-total{
    font-weight:800;
    color:var(--verde-dark);
    font-size:1.1rem;
  }
  .history-items{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .history-item-row{
    display:flex;
    justify-content:space-between;
    font-size:.85rem;
    color:#444;
  }
  .history-item-row .hname{font-weight:600;}
  .history-item-row .hnote{font-size:.75rem; color:var(--gris); font-style:italic;}
  .payment-badge{
    display:inline-block;
    margin-top:4px;
    font-size:.72rem;
    font-weight:700;
    padding:3px 10px;
    border-radius:999px;
    color:#fff;
  }
  .payment-badge.efectivo{background:var(--verde);}
  .payment-badge.transferencia{background:#3f7fa3;}
  .history-photo{
    margin-top:10px;
    max-width:140px;
    border-radius:10px;
    border:2px solid #f1e5d8;
    cursor:pointer;
    display:block;
  }

  main{
    max-width:1200px;
    margin:0 auto;
    padding:22px 16px 60px;
  }

  /* ---------- TABLE SELECTION VIEW ---------- */
  .section-title{
    font-size:1.2rem;
    color:var(--rojo-dark);
    margin:26px 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-title:first-child{margin-top:0;}
  .tables-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:14px;
  }
  .table-card{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:18px 10px;
    text-align:center;
    cursor:pointer;
    border:3px solid transparent;
    transition:transform .18s ease, box-shadow .18s ease;
    position:relative;
  }
  .table-card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 24px rgba(0,0,0,.18);
  }
  .table-card .icon{font-size:2.2rem;}
  .table-card .name{font-weight:700; margin-top:6px; font-size:1.02rem;}
  .table-card .status{
    margin-top:8px;
    font-size:.75rem;
    font-weight:700;
    padding:4px 10px;
    border-radius:999px;
    display:inline-block;
    color:#fff;
  }
  .status.libre{background:var(--libre);}
  .status.ocupada{background:var(--ocupada);}
  .table-card .total-mini{
    margin-top:6px;
    font-size:.78rem;
    color:var(--gris);
    font-weight:600;
  }
  .table-card.occupied-border{border-color:var(--ocupada);}

  /* ---------- POS VIEW ---------- */
  #posView{display:none;}
  .pos-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
    flex-wrap:wrap;
    gap:10px;
  }
  .pos-header h2{
    color:var(--rojo-dark);
    font-size:1.3rem;
  }
  .pos-layout{
    display:grid;
    grid-template-columns:1fr 380px;
    gap:20px;
  }
  @media (max-width:880px){
    .pos-layout{grid-template-columns:1fr;}
  }

  .menu-panel{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px;
  }
  .category-tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:10px;
    margin-bottom:14px;
    border-bottom:2px solid #f1e5d8;
  }
  .category-tabs button{
    flex:0 0 auto;
    background:#fdeee5;
    color:var(--rojo-dark);
    border:none;
    padding:9px 14px;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    font-size:.85rem;
    white-space:nowrap;
    transition:.2s;
  }
  .category-tabs button.active{
    background:linear-gradient(120deg,var(--rojo),var(--naranja));
    color:#fff;
  }
  .products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:12px;
  }
  .product-card{
    background:var(--crema);
    border:2px solid #f3e3d3;
    border-radius:12px;
    padding:12px 10px;
    cursor:pointer;
    text-align:center;
    transition:.15s;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:96px;
  }
  .product-card:hover{
    border-color:var(--naranja);
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(0,0,0,.1);
  }
  .product-card .pname{font-weight:700; font-size:.88rem; line-height:1.2;}
  .product-card .pprice{
    margin-top:6px;
    color:var(--verde-dark);
    font-weight:700;
    font-size:.85rem;
  }

  /* Cart panel */
  .cart-panel{
    background:#fff;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px;
    display:flex;
    flex-direction:column;
    max-height:calc(100vh - 140px);
    position:sticky;
    top:96px;
  }
  .cart-panel h3{
    color:var(--rojo-dark);
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .cart-items{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding-right:4px;
  }
  .cart-empty{
    color:#999;
    text-align:center;
    padding:30px 10px;
    font-size:.9rem;
  }
  .cart-item{
    background:var(--crema);
    border-radius:10px;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .cart-item-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:6px;
  }
  .cart-item-name{font-weight:700; font-size:.88rem;}
  .cart-item-note{font-size:.72rem; color:var(--gris); font-style:italic;}
  .cart-item-remove{
    background:none;
    border:none;
    color:var(--rojo);
    font-size:1.1rem;
    cursor:pointer;
    line-height:1;
  }
  .cart-item-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .qty-control{
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border-radius:8px;
    padding:2px 6px;
    border:1px solid #eddfce;
  }
  .qty-control button{
    background:var(--verde);
    color:#fff;
    border:none;
    width:24px;height:24px;
    border-radius:6px;
    font-weight:700;
    cursor:pointer;
    font-size:.9rem;
  }
  .qty-control button.minus{background:var(--rojo);}
  .qty-control span{font-weight:700; min-width:18px; text-align:center;}
  .cart-item-subtotal{font-weight:700; color:var(--verde-dark); font-size:.9rem;}

  .cart-summary{
    border-top:2px solid #f1e5d8;
    margin-top:12px;
    padding-top:12px;
  }
  .summary-row{
    display:flex;
    justify-content:space-between;
    font-size:.95rem;
    margin-bottom:6px;
  }
  .summary-row.total{
    font-size:1.25rem;
    font-weight:800;
    color:var(--rojo-dark);
  }
  .btn-finalize{
    width:100%;
    margin-top:12px;
    background:linear-gradient(120deg,var(--verde),var(--verde-dark));
    color:#fff;
    border:none;
    padding:14px;
    border-radius:12px;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    transition:.2s;
  }
  .btn-finalize:hover{transform:translateY(-2px); box-shadow:0 8px 18px rgba(63,163,77,.35);}
  .btn-finalize:disabled{
    opacity:.5;
    cursor:not-allowed;
    transform:none;
  }
  .btn-save-order{
    width:100%;
    margin-top:12px;
    background:#fff;
    color:var(--naranja);
    border:2px solid var(--naranja);
    padding:13px;
    border-radius:12px;
    font-weight:700;
    font-size:.95rem;
    cursor:pointer;
    transition:.2s;
  }
  .btn-save-order:hover{background:#fff3e8;}
  .btn-save-order:disabled{
    opacity:.5;
    cursor:not-allowed;
    background:#fff;
  }
  .btn-clear{
    width:100%;
    margin-top:8px;
    background:none;
    border:2px solid #eddfce;
    color:var(--gris);
    padding:9px;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    font-size:.85rem;
  }
  .btn-clear:hover{border-color:var(--rojo); color:var(--rojo);}

  /* Modal for flavors */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:16px;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:#fff;
    border-radius:var(--radius);
    padding:22px;
    max-width:420px;
    width:100%;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
    animation:popin .18s ease;
  }
  @keyframes popin{
    from{transform:scale(.92); opacity:0;}
    to{transform:scale(1); opacity:1;}
  }
  .modal-box h3{color:var(--rojo-dark); margin-bottom:14px;}
  .flavor-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px;
    margin-bottom:16px;
  }
  .flavor-grid button{
    background:var(--crema);
    border:2px solid #f3e3d3;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    font-size:.85rem;
    transition:.15s;
  }
  .flavor-grid button:hover, .flavor-grid button.selected{
    background:linear-gradient(120deg,var(--rojo),var(--naranja));
    color:#fff;
    border-color:transparent;
  }
  .modal-actions{
    display:flex;
    gap:10px;
  }
  .modal-actions button{
    flex:1;
    padding:11px;
    border-radius:10px;
    border:none;
    font-weight:700;
    cursor:pointer;
  }
  .modal-actions .confirm{background:var(--verde); color:#fff;}
  .modal-actions .cancel{background:#eee; color:#555;}

  /* Payment modal */
  .payment-methods{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:16px;
  }
  .payment-option{
    background:var(--crema);
    border:2px solid #f3e3d3;
    border-radius:14px;
    padding:20px 10px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    font-weight:700;
    font-size:.95rem;
    color:#333;
    transition:.15s;
  }
  .payment-option .pico{font-size:2rem;}
  .payment-option:hover{
    border-color:var(--naranja);
    transform:translateY(-2px);
    box-shadow:0 8px 16px rgba(0,0,0,.1);
  }
  .photo-preview-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    margin-bottom:16px;
  }
  #photoPreview{
    display:none;
    max-width:100%;
    max-height:260px;
    border-radius:12px;
    border:2px solid #f3e3d3;
    object-fit:cover;
  }
  .photo-capture-btn{
    display:inline-block;
    background:linear-gradient(120deg,var(--rojo),var(--naranja));
    color:#fff;
    padding:12px 20px;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    text-align:center;
    transition:.2s;
  }
  .photo-capture-btn:hover{transform:translateY(-2px); box-shadow:0 8px 16px rgba(0,0,0,.15);}
  .visually-hidden-file{
    position:absolute;
    width:1px;
    height:1px;
    padding:0;
    margin:-1px;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
    border:0;
  }

  /* Toast */
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--verde-dark);
    color:#fff;
    padding:14px 24px;
    border-radius:12px;
    font-weight:700;
    box-shadow:var(--shadow);
    opacity:0;
    pointer-events:none;
    transition:.3s;
    z-index:200;
    text-align:center;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:#f0c9ad; border-radius:10px;}

  /* ---------- TICKET IMPRIMIBLE ---------- */
  #printTicket{
    display:none;
  }
  .ticket-content{
    width:280px;
    font-family:'Courier New', Courier, monospace;
    color:#000;
    font-size:12px;
    line-height:1.4;
  }
  .ticket-content .t-center{text-align:center;}
  .ticket-content .t-title{font-size:15px; font-weight:700;}
  .ticket-content .t-sep{
    border-top:1px dashed #000;
    margin:6px 0;
  }
  .ticket-content .t-row{
    display:flex;
    justify-content:space-between;
    gap:6px;
  }
  .ticket-content .t-item-name{flex:1;}
  .ticket-content .t-note{
    font-size:10.5px;
    font-style:italic;
    margin-left:8px;
  }
  .ticket-content .t-total{
    font-size:14px;
    font-weight:700;
  }
  .ticket-content .t-small{font-size:10.5px;}
  .ticket-content .t-order-label{
    font-weight:700;
    font-size:12.5px;
    letter-spacing:1px;
  }
  .ticket-content .t-item{
    font-size:13px;
    font-weight:700;
  }

  .btn-print-ticket{
    width:100%;
    margin-top:8px;
    background:#333;
    color:#fff;
    border:none;
    padding:11px;
    border-radius:10px;
    font-weight:700;
    font-size:.88rem;
    cursor:pointer;
  }
  .btn-print-ticket:hover{background:#111;}
  .success-msg{
    text-align:center;
    color:var(--gris);
    font-weight:600;
    margin-bottom:14px;
    font-size:.95rem;
  }
  .history-reprint{
    margin-top:10px;
    background:none;
    border:2px solid #eddfce;
    color:var(--gris);
    padding:7px 12px;
    border-radius:8px;
    font-weight:600;
    font-size:.78rem;
    cursor:pointer;
  }
  .history-reprint:hover{border-color:#333; color:#333;}

  @media print{
    body *{visibility:hidden;}
    #printTicket, #printTicket *{visibility:visible;}
    #printTicket{
      display:block;
      position:absolute;
      top:0;
      left:0;
      width:auto;
    }
    @page{margin:6mm;}
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="logo">🍓</div>
    <div>
      <h1>Frutería Málaga</h1>
      <span class="sub">El Carmen, Manabí · Punto de Venta</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-back" id="btnBack">⬅ Volver a mesas</button>
    <button class="btn-history" id="btnHistory">📜 Historial</button>
  </div>
</header>

<main>
  <!-- TABLE SELECTION VIEW -->
  <div id="tablesView">
    <h2 class="section-title">🪑 Sala</h2>
    <div class="tables-grid" id="salaGrid"></div>

    <h2 class="section-title">🌳 Fuera</h2>
    <div class="tables-grid" id="fueraGrid"></div>

    <h2 class="section-title">🍹 Barra</h2>
    <div class="tables-grid" id="barraGrid"></div>
  </div>

  <!-- POS VIEW -->
  <div id="posView">
    <div class="pos-header">
      <h2 id="posTableName">Mesa</h2>
    </div>
    <div class="pos-layout">
      <div class="menu-panel">
        <div class="category-tabs" id="categoryTabs"></div>
        <div class="products-grid" id="productsGrid"></div>
      </div>
      <div class="cart-panel">
        <h3>🛒 Carrito</h3>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-summary">
          <div class="summary-row total">
            <span>Total</span>
            <span id="cartTotal">$0.00</span>
          </div>
          <button class="btn-save-order" id="btnSaveOrder" disabled>💾 Guardar pedido</button>
          <button class="btn-finalize" id="btnFinalize" disabled>✅ Cobrar / Finalizar venta</button>
          <button class="btn-clear" id="btnClearCart">🗑 Vaciar carrito</button>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="historyView">
    <div class="history-header">
      <h2>📜 Historial de Ventas</h2>
      <button class="btn-clear-history" id="btnClearHistory">🗑 Borrar historial</button>
    </div>
    <div class="history-summary" id="historySummary"></div>
    <div class="history-list" id="historyList"></div>
  </div>
</main>

<!-- Payment Modal -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal-box">

    <!-- Paso 1: elegir método -->
    <div id="paymentStepMethod">
      <h3>💳 ¿Cómo va a pagar?</h3>

const STORAGE_KEY = "fruteriaMalagaCarts";

/* ================= STATE ================= */
let carts = loadCarts();

function loadCarts(){
  try{

    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}

  localStorage.setItem(STORAGE_KEY, JSON.stringify(carts));
}
function getCart(tableId){
  if(!carts[tableId]) carts[tableId] = [];
  return carts[tableId];
}
function cartTotal(tableId){
  return getCart(tableId).reduce((sum,i)=> sum + i.price*i.qty, 0);
}

/* ================= RENDER TABLES ================= */
function renderTables(){
  renderTableGroup("salaGrid", TABLES.sala);
  renderTableGroup("fueraGrid", TABLES.fuera);

}
function renderTableGroup(containerId, list){
  const el = document.getElementById(containerId);
  el.innerHTML = "";

    const cart = getCart(t.id);
    const occupied = cart.length > 0;
    const card = document.createElement("div");
    card.className = "table-card" + (occupied ? " occupied-border" : "");
    card.innerHTML = `
      <div class="icon">${t.icon}</div>
      <div class="name">${t.name}</div>

/* ================= VIEW NAVIGATION ================= */

/* ================= HISTORY VIEW ================= */
document.getElementById("btnHistory").addEventListener("click", ()=>{

    showView("tables");

  }else{
    currentTable = null;
    showView("history");
    renderHistory();
  }
});
document.getElementById("btnClearHistory").addEventListener("click", ()=>{
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  if(history.length === 0) return;
  if(confirm("¿Borrar todo el historial de ventas? Esta acción no se puede deshacer.")){
    localStorage.setItem(HISTORY_KEY, "[]");
    renderHistory();
  }
});
function renderHistory(){
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  const sorted = [...history].reverse(); // más reciente primero
  const summaryEl = document.getElementById("historySummary");
  const listEl = document.getElementById("historyList");

  const grandTotal = history.reduce((s,h)=> s + h.total, 0);
  summaryEl.innerHTML = `
    <div class="stat">
      <span class="label">Ventas registradas</span>
      <span class="value">${history.length}</span>
    </div>
    <div class="stat">
      <span class="label">Total acumulado</span>
      <span class="value">$${grandTotal.toFixed(2)}</span>
    </div>
  `;

  if(sorted.length === 0){
    listEl.innerHTML = `<div class="history-empty">Aún no hay ventas registradas.</div>`;
    return;
  }

  listEl.innerHTML = "";
  sorted.forEach(sale=>{
    const date = new Date(sale.date);

        <span class="hname">${i.qty}x ${i.name}${i.note ? ` <span class="hnote">(${i.note})</span>` : ""}</span>

      </div>
    `).join("");

    const card = document.createElement("div");
    card.className = "history-card";
    const methodClass = sale.paymentMethod === "Transferencia" ? "transferencia" : "efectivo";
    const methodIcon = sale.paymentMethod === "Transferencia" ? "🏦" : "💵";
    card.innerHTML = `
      <div class="history-card-top">
        <div>
          <div class="history-card-table">${tableName}</div>
          <div class="history-card-date">${fecha} · ${hora}</div>
          ${sale.paymentMethod ? `<span class="payment-badge ${methodClass}">${methodIcon} ${sale.paymentMethod}</span>` : ""}
        </div>
        <div class="history-card-total">$${sale.total.toFixed(2)}</div>
      </div>
      <div class="history-items">${itemsHtml}</div>
      ${sale.photo ? `<img src="${sale.photo}" class="history-photo" alt="Comprobante de transferencia">` : ""}

    `;

      card.querySelector(".history-photo").addEventListener("click", ()=>{
        window.open(sale.photo, "_blank");
      });
    }
    card.querySelector(".history-reprint").addEventListener("click", ()=>{
      printTicket({...sale, tableName});
    });
    listEl.appendChild(card);
  });
}
function tableNameById(id){
  const all = [...TABLES.sala, ...TABLES.fuera, ...TABLES.barra];
  const found = all.find(t => t.id === id);
  return found ? found.name : id;
}

/* ================= CART LOGIC ================= */
function addToCart(product, note){
  const cart = getCart(currentTable);
  const existing = cart.find(i => i.name === product.name && i.note === note);
  if(existing){
    existing.qty += 1;
  }else{
    cart.push({name:product.name, price:product.price, qty:1, note:note});
  }
  saveCarts();
  renderCart();
  showToast(`${product.name} agregado ✅`);
}
function changeQty(index, delta){
  const cart = getCart(currentTable);
  cart[index].qty += delta;
  if(cart[index].qty <= 0){
    cart.splice(index,1);
  }
  saveCarts();
  renderCart();
}
function removeItem(index){
  const cart = getCart(currentTable);
  cart.splice(index,1);
  saveCarts();
  renderCart();
}
function clearCart(){
  if(!currentTable) return;
  if(getCart(currentTable).length === 0) return;
  if(confirm("¿Vaciar el carrito de esta mesa?")){
    carts[currentTable] = [];
    saveCarts();
    renderCart();
  }
}
document.getElementById("btnClearCart").addEventListener("click", clearCart);

document.getElementById("btnSaveOrder").addEventListener("click", saveOrderAndReturn);
function saveOrderAndReturn(){
  const cart = getCart(currentTable);
  if(cart.length === 0) return;
  // El carrito ya se guarda automáticamente en localStorage con cada cambio.
  saveCarts();

  // Imprime la comanda para cocina/preparación, ya con el total incluido.
  // Este mismo papel se reutiliza al final para entregárselo al cliente cuando pague.
  const orderTicket = {
    table: currentTable,
    tableName: tableNameById(currentTable),
    items: cart,
    total: cartTotal(currentTable),
    date: new Date().toISOString(),
    paymentMethod: null,
    photo: null

  printTicket(orderTicket);

  showToast("Pedido guardado 💾 · Mesa ocupada · Imprimiendo comanda...");
  setTimeout(closeTable, 700);
}

function renderCart(){
  const cart = getCart(currentTable);
  const el = document.getElementById("cartItems");
  el.innerHTML = "";
  if(cart.length === 0){
    el.innerHTML = `<div class="cart-empty">El carrito está vacío.<br>Selecciona productos del menú.</div>`;
  }else{
    cart.forEach((item, idx)=>{
      const div = document.createElement("div");
      div.className = "cart-item";
      div.innerHTML = `
        <div class="cart-item-top">
          <div>
            <div class="cart-item-name">${item.name}</div>
            ${item.note ? `<div class="cart-item-note">Sabor: ${item.note}</div>` : ""}
          </div>
          <button class="cart-item-remove" title="Eliminar">✕</button>
        </div>
        <div class="cart-item-bottom">
          <div class="qty-control">
            <button class="minus">−</button>
            <span>${item.qty}</span>
            <button class="plus">+</button>
          </div>
          <div class="cart-item-subtotal">$${(item.price*item.qty).toFixed(2)}</div>
        </div>
      `;
      div.querySelector(".minus").addEventListener("click", ()=>changeQty(idx,-1));
      div.querySelector(".plus").addEventListener("click", ()=>changeQty(idx,1));
      div.querySelector(".cart-item-remove").addEventListener("click", ()=>removeItem(idx));
      el.appendChild(div);
    });
  }
  const total = cartTotal(currentTable);
  document.getElementById("cartTotal").textContent = "$" + total.toFixed(2);
  document.getElementById("btnFinalize").disabled = cart.length === 0;
  document.getElementById("btnSaveOrder").disabled = cart.length === 0;
}

let lastCompletedSale = null;

// Respaldo: algunos navegadores/webviews no disparan el input al hacer clic
// en el <label for="..."> asociado, así que forzamos el click por JS también.
document.getElementById("photoCaptureLabel").addEventListener("click", (e)=>{
  e.preventDefault();
  document.getElementById("transferPhotoInput").click();
});

document.getElementById("transferPhotoInput").addEventListener("change", (e)=>{
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  compressImage(file, (dataUrl)=>{
    capturedPhotoDataUrl = dataUrl;
    const img = document.getElementById("photoPreview");
    img.src = dataUrl;
    img.style.display = "block";
    document.getElementById("photoConfirm").disabled = false;
    showToast("Foto cargada 📷");
  }, (err)=>{
    console.error("Error al procesar la foto:", err);
    showToast("No se pudo procesar la foto ⚠️ Intenta de nuevo");
  });
});

document.getElementById("photoConfirm").addEventListener("click", ()=>{
  if(!capturedPhotoDataUrl) return;
  completeSale("Transferencia", capturedPhotoDataUrl);
});

function compressImage(file, callback, onError){
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      try{
        const maxW = 900;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale) || img.width;
        canvas.height = Math.round(img.height * scale) || img.height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        callback(canvas.toDataURL("image/jpeg", 0.75));
      }catch(err){
        if(onError) onError(err);
      }
    };
    img.onerror = function(err){
      if(onError) onError(err);
    };
    img.src = ev.target.result;
  };
  reader.onerror = function(err){
    if(onError) onError(err);
  };
  reader.readAsDataURL(file);
}

function completeSale(method, photoDataUrl){
  const cart = getCart(currentTable);
  const total = cartTotal(currentTable);
  const tableName = tableNameById(currentTable);

  const saleRecord = {
    table: currentTable,
    tableName: tableName,
    items: cart,
    total: total,
    date: new Date().toISOString(),
    paymentMethod: method,
    photo: photoDataUrl || null
  };

  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  history.push(saleRecord);
  try{
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  }catch(e){
    // Si el almacenamiento se llena por el tamaño de la foto, se guarda sin ella
    saleRecord.photo = null;
    history[history.length - 1] = saleRecord;
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    showToast("Venta guardada, pero la foto era muy pesada para guardarse ⚠️");
  }

  // Guardar la foto también en la galería del dispositivo/descargas
  if(photoDataUrl){
    saveImageToGallery(photoDataUrl, `comprobante_${currentTable}_${Date.now()}.jpg`);
  }

  carts[currentTable] = [];
  saveCarts();
  renderCart();

  lastCompletedSale = saleRecord;
  document.getElementById("successMsg").textContent =
    `${tableName} · ${method} · Total $${total.toFixed(2)}`;
  showPaymentStep("success");
}

document.getElementById("btnPrintTicket").addEventListener("click", ()=>{
  if(lastCompletedSale) printTicket(lastCompletedSale);
});
document.getElementById("btnDonePayment").addEventListener("click", ()=>{
  closePaymentModal();
  showToast(`Pago exitoso ✅ · Total $${lastCompletedSale ? lastCompletedSale.total.toFixed(2) : ""}`);
  closeTable();
});

function saveImageToGallery(dataUrl, filename){
  try{
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }catch(err){
    console.error("No se pudo descargar automáticamente la foto:", err);
    // Respaldo: abrir la imagen en una pestaña nueva para que el usuario
    // pueda guardarla manualmente (mantener presionado > Guardar imagen).
    try{
      window.open(dataUrl, "_blank");
      showToast("Mantén presionada la foto para guardarla en tu galería 📷");
    }catch(err2){
      console.error("Tampoco se pudo abrir la foto en pestaña nueva:", err2);
    }
  }
}

/* ================= TICKET IMPRIMIBLE ================= */
function buildTicketHtml(sale){
  const date = new Date(sale.date);
  const fecha = date.toLocaleDateString("es-EC", {day:"2-digit", month:"2-digit", year:"numeric"});
  const hora = date.toLocaleTimeString("es-EC", {hour:"2-digit", minute:"2-digit"});
  const tableName = sale.tableName || tableNameById(sale.table);
  const isPaid = !!sale.paymentMethod;

  const itemsHtml = sale.items.map(i => `
    <div class="t-row t-item">
      <span class="t-item-name">${i.qty}x ${i.name}</span>
      <span>$${(i.price*i.qty).toFixed(2)}</span>
    </div>
    ${i.note ? `<div class="t-note">Sabor: ${i.note}</div>` : ""}
  `).join("");

  return `
    <div class="ticket-content">
      <div class="t-center t-title">Frutería Málaga</div>
      <div class="t-center t-small">El Carmen, Manabí</div>
      <div class="t-sep"></div>
      <div class="t-row t-small"><span>${fecha}</span><span>${hora}</span></div>
      <div class="t-row t-small"><span>Mesa:</span><span>${tableName}</span></div>
      <div class="t-sep"></div>
      <div class="t-center t-order-label">${isPaid ? "PEDIDO" : "PEDIDO PARA PREPARAR"}</div>
      <div class="t-sep"></div>
      ${itemsHtml}
      <div class="t-sep"></div>
      <div class="t-row t-total"><span>TOTAL</span><span>$${sale.total.toFixed(2)}</span></div>
      <div class="t-row t-small">
        <span>Pago:</span>
        <span>${isPaid ? sale.paymentMethod : "PENDIENTE"}</span>
      </div>
      <div class="t-sep"></div>
      <div class="t-center t-small">
        ${isPaid ? "¡Gracias por su compra!" : "Conservar y entregar al cliente al pagar"}
      </div>
    </div>
  `;
}
function printTicket(sale){
  document.getElementById("printTicket").innerHTML = buildTicketHtml(sale);
  window.print();
}

/* ================= FLAVOR MODAL ================= */
function openFlavorModal(product){
  pendingFlavorProduct = product;
  selectedFlavor = []; // array de sabores elegidos
  const max = product.flavors || 1;
  const isFruit = product.flavorType === "fruta";
  const flavorList = isFruit ? FRUIT_FLAVORS : ICE_CREAM_FLAVORS;
  const grid = document.getElementById("flavorGrid");
  grid.innerHTML = "";

  const label = isFruit ? "🍹 Elige el sabor" : "🍨 Elige el sabor";
  document.querySelector("#flavorModal h3").textContent =
    max === 1 ? label : `${isFruit ? "🍹" : "🍨"} Elige ${max} sabores`;

  flavorList.forEach(f=>{
    const btn = document.createElement("button");
    btn.textContent = f;
    btn.addEventListener("click", ()=>{
      const idx = selectedFlavor.indexOf(f);
      if(idx > -1){
        // deseleccionar
        selectedFlavor.splice(idx,1);
        btn.classList.remove("selected");
      }else{
        if(max === 1){
          // selección única: reemplaza la anterior
          selectedFlavor = [f];
          grid.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
          btn.classList.add("selected");
        }else{
          if(selectedFlavor.length >= max){
            showToast(`Máximo ${max} sabores para ${product.name}`);
            return;
          }
          selectedFlavor.push(f);
          btn.classList.add("selected");
        }
      }
      updateFlavorConfirmState(max);
    });
    grid.appendChild(btn);
  });
  updateFlavorConfirmState(max);
  document.getElementById("flavorModal").classList.add("show");
}
function updateFlavorConfirmState(max){
  const confirmBtn = document.getElementById("flavorConfirm");
  const count = selectedFlavor.length;
  const complete = max === 1 ? count === 1 : count === max;
  confirmBtn.disabled = !complete;
  confirmBtn.style.opacity = complete ? 1 : .5;
  confirmBtn.textContent = max === 1
    ? "Agregar"
    : `Agregar (${count}/${max})`;
}
document.getElementById("flavorCancel").addEventListener("click", ()=>{
  document.getElementById("flavorModal").classList.remove("show");
  pendingFlavorProduct = null;
});
document.getElementById("flavorConfirm").addEventListener("click", ()=>{
  if(!pendingFlavorProduct) return;
  const max = pendingFlavorProduct.flavors || 1;
  if(selectedFlavor.length !== max) return;
  addToCart(pendingFlavorProduct, selectedFlavor.join(", "));
  document.getElementById("flavorModal").classList.remove("show");
  pendingFlavorProduct = null;
});

/* ================= TOAST ================= */
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove("show"), 1800);
}

/* ================= INIT ================= */
renderTables();
</script>
